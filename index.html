<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Authorized access only.">
<meta name="theme-color" content="#050507">
<meta property="og:title" content="dom.">
<meta property="og:description" content="Authorized access only.">
<title>dom.</title>
<style>
  :root{
    --bg:#050507; --fg:#f1f1f3; --dim:#8a8a93; --faint:#5c5c65; --accent:#4ade80; --red:#ff5f5f;
    --cardbg:rgba(18,18,23,.55); --cardline:rgba(255,255,255,.09); --inset:rgba(0,0,0,.3);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Inter,Roboto,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden}

  .sky{position:fixed;inset:0;z-index:0;background:linear-gradient(180deg,#040406 0%,#050507 60%,#07090b 100%)}
  .hglow{position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity 1.8s ease;
    background:radial-gradient(95% 60% at 50% 116%,rgba(210,235,240,.10),rgba(120,200,190,.05) 45%,transparent 62%)}
  body.flight .hglow{opacity:0}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none;transform-origin:50% 42%;will-change:transform;transition:none}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#dfe8e3;animation:tw 4s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.10}50%{opacity:.8}}
  .sat{position:fixed;z-index:0;left:-4vw;top:30vh;width:3px;height:3px;border-radius:50%;background:#eafff2;
    box-shadow:0 0 6px rgba(160,255,200,.9);animation:cross 26s linear infinite;pointer-events:none}
  .sat::after{content:"";position:absolute;right:2px;top:1px;width:46px;height:1px;
    background:linear-gradient(90deg,transparent,rgba(160,255,200,.35));transform:translateY(-50%)}
  @keyframes cross{0%{transform:translate(0,0)}100%{transform:translate(112vw,-14vh)}}
  @media (prefers-reduced-motion: reduce){.sat{display:none}.stars i{animation:none;opacity:.4}}

  canvas#earth{position:fixed;inset:0;z-index:1;transition:none;width:100vw;height:100vh;height:100dvh;pointer-events:none}
  /* CSS fallback planet if WebGL unavailable */
  .planetfb{display:none;position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:3200px;height:230px;z-index:1;pointer-events:none}
  .nogl .planetfb{display:block}
  .nogl canvas#earth{display:none}
  .planetfb .atmo{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:3000px;height:3000px;border-radius:50%;
    box-shadow:0 -14px 90px 10px rgba(74,222,128,.30),0 -50px 220px 40px rgba(74,222,128,.12)}
  .planetfb .planet{position:absolute;left:50%;top:14px;transform:translateX(-50%);width:3000px;height:3000px;border-radius:50%;
    background:
      repeating-conic-gradient(from -90deg at 50% 50%,rgba(120,235,170,.10) 0 .12deg,transparent .12deg 4.8deg),
      repeating-radial-gradient(circle at 50% 50%,transparent 0 118px,rgba(120,235,170,.10) 118px 119px),
      radial-gradient(100% 100% at 50% 0%,rgba(74,222,128,.16),rgba(8,20,13,.9) 8%,#060a08 16%);
    border-top:1px solid rgba(140,255,190,.5)}
  body.flight canvas#earth{z-index:10}
  .vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(85% 80% at 50% 40%,transparent 55%,rgba(0,0,0,.5))}

  .wrap{position:relative;z-index:3;flex:1;display:flex;flex-direction:column;padding:30px clamp(24px,5vw,60px)}
  header,footer{display:flex;justify-content:space-between;align-items:center;text-shadow:0 1px 8px rgba(0,0,0,.8);
    font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .status{display:flex;align-items:center;gap:9px;transition:color .3s}
  .status.denied{color:var(--red)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2.4s infinite}
  .status.denied .dot{background:var(--red);animation:none;box-shadow:0 0 8px rgba(255,95,95,.6)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;min-height:0}

  .hero{text-align:center;animation:rise 1.1s cubic-bezier(.2,.6,.2,1) both;
    transition:opacity .5s ease,transform .5s ease,max-height .5s ease,margin .5s ease;max-height:220px;overflow:hidden}
  .hero.gone{opacity:0;transform:translateY(-22px);max-height:0;pointer-events:none}
  .hero .big{font-family:"SF Pro Display","SF Pro Text",-apple-system,BlinkMacSystemFont,"Helvetica Neue","Segoe UI",Helvetica,Arial,sans-serif;
    font-size:clamp(50px,7vw,96px);font-weight:600;letter-spacing:-.045em;line-height:1;
    background:linear-gradient(180deg,#fafafb 15%,#d6d7db 55%,#a6a8ae 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .big em{font-style:normal;color:var(--accent);-webkit-text-fill-color:var(--accent)}
  .hero .sub{margin-top:13px;font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--dim);font-weight:500}
  @keyframes rise{from{opacity:0;transform:translateY(26px)}}

  @property --bang{syntax:'<angle>';initial-value:0deg;inherits:false}
  .card{position:relative;width:min(92vw,400px);background:var(--cardbg);
    border:1px solid var(--cardline);border-radius:20px;padding:26px;
    backdrop-filter:blur(20px) saturate(130%);-webkit-backdrop-filter:blur(20px) saturate(130%);
    box-shadow:0 30px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
    animation:rise 1.1s .15s cubic-bezier(.2,.6,.2,1) both;
    transition:width .55s cubic-bezier(.4,0,.2,1)}
  .card.wide{width:min(94vw,596px);padding:34px 32px}
  .card::before{content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;pointer-events:none;
    background:conic-gradient(from var(--bang),transparent 0 72%,rgba(74,222,128,.6) 86%,transparent 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
    animation:beam 7s linear infinite}
  @keyframes beam{to{--bang:360deg}}
  .card.denied::before{background:conic-gradient(from var(--bang),transparent 0 72%,rgba(255,95,95,.55) 86%,transparent 100%)}

  form{display:flex;flex-direction:column;gap:12px}
  .field{display:flex;align-items:center;background:var(--inset);border:1px solid var(--cardline);border-radius:12px;padding:0 15px;transition:.2s}
  .field:focus-within{border-color:rgba(255,255,255,.22)}
  .field.error{border-color:rgba(255,95,95,.6)}
  .field.error .k{color:var(--red)}
  .shake{animation:shake .34s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  .field .k{color:var(--faint);font-size:14px;margin-right:11px}
  input{flex:1;background:none;border:none;outline:none;color:var(--fg);font-family:var(--sans);font-size:14.5px;padding:14px 0;letter-spacing:.14em}
  input::placeholder{color:#55555e;letter-spacing:.12em}
  button{background:#d3d4d8;color:#0b0b0d;border:none;border-radius:12px;padding:14px;
    font-family:var(--sans);font-size:13.5px;font-weight:600;cursor:pointer;transition:.2s}
  button:hover{background:#e6e7ea}
  .foot-note{text-align:center;font-size:10.5px;letter-spacing:.08em;color:var(--faint);margin-top:16px}

  /* authorizing */
  .auth{display:none;flex-direction:column;gap:22px}
  .auth.on{display:flex}
  .scope-row{display:flex;gap:28px;align-items:center}
  .locate{display:flex;flex-direction:column;align-items:center;gap:16px;flex:none}
  .globe{position:relative;width:180px;height:180px}
  .nogl .globe::before{content:"";position:absolute;inset:2%;border-radius:50%;
    background:radial-gradient(circle at 38% 30%,#12241a,#07100b 70%);border:1px solid rgba(120,235,170,.25)}
  #ovl{position:fixed;z-index:12;pointer-events:none;left:0;top:0;width:180px;height:180px}
  .gset{position:absolute;inset:0;opacity:0;transition:opacity .6s}
  .gset.on{opacity:1}
  .gset svg{width:100%;height:100%;overflow:visible}
  .g-orbit{fill:none;stroke:rgba(255,255,255,.14);stroke-width:.8;stroke-dasharray:2 5}
  .g-sat{fill:#cfe9dc}
  .g-sat2{fill:rgba(74,222,128,.9)}
  .arc{fill:none;stroke:rgba(74,222,128,.6);stroke-width:1.2}
  .node{fill:none;stroke:rgba(74,222,128,.85);stroke-width:1.1}
  .nodecore{fill:var(--accent)}
  .pk{fill:#eafff2}
  .m-dot{fill:var(--accent)}
  .m-glow{fill:var(--accent);opacity:.16}
  .m-ring{fill:none;stroke:var(--accent);stroke-width:1.2;transform-box:fill-box;transform-origin:center;animation:beacon 2.2s ease-out infinite}
  @keyframes beacon{0%{transform:scale(.4);opacity:.9}100%{transform:scale(2.6);opacity:0}}
  .m-tick{stroke:var(--accent);stroke-width:1;opacity:.7}
  .coords{font-size:11px;letter-spacing:.08em;color:var(--dim);font-variant-numeric:tabular-nums;min-height:14px}
  .coords b{color:var(--fg);font-weight:500}
  .log{flex:1;display:flex;flex-direction:column;gap:11px;font-size:13.5px;min-width:0}
  .row{display:flex;align-items:center;gap:11px;color:var(--dim);opacity:0;transform:translateY(3px);transition:.35s}
  .row.show{opacity:1;transform:none}
  .row .ic{width:14px;text-align:center;color:var(--accent);font-size:12px}
  .row .ic.wait{color:var(--faint);animation:blink 1.1s ease-in-out infinite}
  @keyframes blink{50%{opacity:.25}}
  .bar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--accent);transition:width .5s ease}
  .bar i.deny{background:var(--red)}
  .origin{width:100%;border:1px solid var(--cardline);border-radius:14px;padding:16px 18px;background:var(--inset);
    display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
  .origin .l{color:var(--faint);letter-spacing:.12em;text-transform:uppercase;font-size:10px;margin-bottom:5px;font-weight:500}
  .origin .v{color:var(--fg);font-size:14px;font-variant-numeric:tabular-nums}
  .origin .v.acc{color:var(--accent)}
  .verdict{position:relative;overflow:hidden;width:100%;text-align:center;font-size:12.5px;letter-spacing:.03em;
    padding:13px;border-radius:12px;border:1px solid var(--cardline);background:rgba(74,222,128,.06);color:var(--accent);transition:.4s;font-weight:500}
  .verdict:not(.deny)::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(105deg,transparent 40%,rgba(74,222,128,.14) 50%,transparent 60%);animation:sheen 2.2s ease infinite}
  @keyframes sheen{to{transform:translateX(100%)}}
  .verdict.deny{border-color:rgba(255,95,95,.28);background:rgba(255,95,95,.07);color:var(--red)}
  a{color:inherit;text-decoration:none}

  @media(max-width:600px){
    .wrap{padding:18px 16px}
    .card{padding:22px 18px;border-radius:18px}
    .card.wide{padding:24px 18px}
    .hero .big{font-size:44px}
    .hero .sub{letter-spacing:.22em;font-size:10px}
    .auth{gap:15px}
    .scope-row{gap:14px}
    .globe{width:112px;height:112px}
    .coords{font-size:10px}
    .log{gap:8px;font-size:11.5px}
    .bar{height:2px}
    .origin{padding:13px 14px;gap:11px 13px}
    .origin .v{font-size:12.5px}
    .verdict{padding:11px;font-size:11.5px}
    header,footer{font-size:10px}
  }
  @media(max-height:600px){
    .hero{display:none}
    .globe{width:96px;height:96px}
    .auth{gap:12px}.card.wide{padding:20px}
  }
</style>
</head>
<body>
  <div class="sky"></div>
  <div class="hglow"></div>
  <div class="stars" id="stars"></div>
  <div class="sat"></div>
  <canvas id="earth"></canvas>
  <div class="planetfb"><div class="atmo"></div><div class="planet"></div></div>
  <div class="vig"></div>

  <div class="wrap">
    <header>
      <div id="hloc">Locating&hellip;</div>
      <div class="status" id="hbadge"><span class="dot"></span> <span id="hstat">Secure</span></div>
    </header>

    <main>
      <div class="hero" id="hero">
        <div class="big">dom<em>.</em></div>
        <div class="sub">Authorized access only</div>
      </div>

      <div class="card" id="card">
        <!-- GATE -->
        <div id="gate">
          <form onsubmit="startAuth();return false">
            <div class="field" id="field"><span class="k">&rsaquo;</span><input id="key" type="text" placeholder="Access key" autocomplete="off" oninput="document.getElementById('field').classList.remove('error')"></div>
            <button type="submit">Continue</button>
          </form>
          <div class="foot-note">Access is granted by invitation</div>
        </div>

        <!-- AUTHORIZING -->
        <div class="auth" id="auth">
          <div class="scope-row">
            <div class="locate">
              <div class="globe" id="globeSlot">
              </div>
              <div class="coords" id="coords"></div>
            </div>
            <div class="log" id="log">
              <div class="row" data-i="0"><span class="ic">&#10003;</span><span>Establishing secure channel</span></div>
              <div class="row" data-i="1"><span class="ic">&#10003;</span><span>Fingerprinting device</span></div>
              <div class="row" data-i="2"><span class="ic">&#10003;</span><span>Resolving origin</span></div>
              <div class="row" data-i="3"><span class="ic wait">&#9675;</span><span>Cross-referencing registry</span></div>
              <div class="row" data-i="4"><span class="ic wait">&#9675;</span><span>Validating key signature</span></div>
            </div>
          </div>
          <div class="bar"><i id="bar"></i></div>
          <div class="origin">
            <div><div class="l">Origin IP</div><div class="v acc" id="ip">&mdash;</div></div>
            <div><div class="l">Location</div><div class="v" id="loc">Resolving&hellip;</div></div>
            <div><div class="l">Network</div><div class="v" id="isp">&mdash;</div></div>
            <div><div class="l">Session</div><div class="v" id="sid">&mdash;</div></div>
          </div>
          <div class="verdict" id="verdict">Verifying credentials&hellip;</div>
        </div>
      </div>
    </main>

    <footer>
      <div id="fkey">Node 00</div>
      <div>&copy; 2026</div>
    </footer>
  </div>

<div id="ovl">
                <div class="gset" id="gset">
                  <svg viewBox="0 0 200 200" aria-hidden="true">
                    <g transform="rotate(-16 100 100)">
                      <ellipse class="g-orbit" cx="100" cy="100" rx="112" ry="34"/>
                      <path id="ob1" d="M-12,100 a112,34 0 1,0 224,0 a112,34 0 1,0 -224,0" fill="none" stroke="none"/>
                      <circle class="g-sat" r="2.4"><animateMotion dur="9s" repeatCount="indefinite"><mpath href="#ob1"/></animateMotion></circle>
                    </g>
                    <g transform="rotate(24 100 100)">
                      <ellipse class="g-orbit" cx="100" cy="100" rx="118" ry="27" style="stroke-opacity:.5"/>
                      <path id="ob2" d="M-18,100 a118,27 0 1,0 236,0 a118,27 0 1,0 -236,0" fill="none" stroke="none"/>
                      <circle class="g-sat2" r="1.9"><animateMotion dur="13s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear"><mpath href="#ob2"/></animateMotion></circle>
                    </g>
                    <path class="arc" id="arc"/>
                    <g id="relay" opacity="0">
                      <rect class="node" x="158" y="26" width="9" height="9" rx="2"/>
                      <circle class="nodecore" cx="162.5" cy="30.5" r="1.6"/>
                    </g>
                    <circle class="pk" id="pk" r="1.8" opacity="0"/>
                    <g transform="translate(100 100)">
                      <circle class="m-glow" r="9"/>
                      <circle class="m-ring" r="6"/>
                      <line class="m-tick" x1="-12" y1="0" x2="-6" y2="0"/>
                      <line class="m-tick" x1="6" y1="0" x2="12" y2="0"/>
                      <line class="m-tick" x1="0" y1="-12" x2="0" y2="-6"/>
                      <line class="m-tick" x1="0" y1="6" x2="0" y2="12"/>
                      <circle class="m-dot" r="3"/>
                    </g>
                  </svg>
                </div>
</div>
<script>
  /* ---------- starfield ---------- */
  (function(){
    var c=document.getElementById('stars'),i;
    for(i=0;i<90;i++){
      var s=document.createElement('i');
      s.style.left=(Math.random()*100)+'vw';
      s.style.top=(Math.random()*70)+'vh';
      s.style.transform='scale('+(0.5+Math.random()*1.1).toFixed(2)+')';
      s.style.animationDelay=(Math.random()*4).toFixed(2)+'s';
      s.style.animationDuration=(2.6+Math.random()*4).toFixed(2)+'s';
      c.appendChild(s);
    }
  })();

  /* ---------- origin lookup ---------- */
  var DEMO={ip:"203.0.113.42",city:"London",cc:"GB",country:"United Kingdom",isp:"Zayo Bandwidth",lat:51.5074,lon:-0.1278};
  function hex(n){var s="";for(var i=0;i<n;i++)s+="0123456789ABCDEF"[Math.floor(Math.random()*16)];return s;}
  async function resolveIP(){
    try{var c=new AbortController();setTimeout(function(){c.abort();},1500);
      var r=await fetch("https://ipwho.is/",{signal:c.signal});var d=await r.json();
      if(d&&d.success!==false)return{ip:d.ip,city:d.city,cc:d.country_code,country:d.country,isp:(d.connection&&d.connection.isp)||"—",lat:d.latitude,lon:d.longitude};
    }catch(e){}
    return DEMO;
  }
  function fmtLoc(d){var s=(d.city?d.city+", ":"")+(d.cc||d.country||"");return s||"Unknown";}
  function fmtCoords(la,lo){
    return Math.abs(la).toFixed(4)+"° "+(la>=0?"N":"S")+" · "+Math.abs(lo).toFixed(4)+"° "+(lo>=0?"E":"W");
  }
  var originData=null;
  var originReady=resolveIP().then(function(d){
    originData=d;
    var h=document.getElementById('hloc');if(h)h.textContent=fmtLoc(d);
    return d;

    " vec2 pn=(r>0.0001)?p/r:vec2(0.0,1.0);",
    " float limbLight=clamp(dot(vec3(pn,0.18),uSun)*0.72+0.50,0.05,1.05);",
    " vec3 atmoThin=mix(vec3(0.15,0.35,0.85),vec3(0.72,0.28,0.24),uDeny*0.65);",
    " vec3 atmoDense=mix(vec3(0.78,0.87,1.00),vec3(0.95,0.62,0.55),uDeny*0.65);",
    " float I=(x<0.0)?smoothstep(-1.2,0.0,x):(1.0-smoothstep(0.0,0.5,x));",
    " vec3 atmoCol=mix(atmoThin,atmoDense,clamp(I*1.05,0.0,1.0));",
    " vec3 atmoLum=atmoCol*limbLight*I*0.44;",
    " vec3 col=vec3(0.0);float alpha=0.0;",
    " if(r<1.0){",
    "  float z=sqrt(max(0.0,1.0-r*r));",
    "  vec3 n=vec3(p,z);",
    "  float ct=cos(uTilt),st=sin(uTilt);",
    "  vec3 n1=vec3(n.x,n.y*ct-n.z*st,n.y*st+n.z*ct);",
    "  float lat=asin(clamp(n1.y,-1.0,1.0));",
    "  float lon=atan(n1.x,n1.z)+uRot;",
    "  vec2 uv=vec2(lon/6.28318530718+0.5,0.5-lat/3.14159265359);",
    "  vec3 tex=texture2D(uTex,uv).rgb;",
    "  tex=mix(tex,vec3(0.92,0.94,0.96),smoothstep(0.965,0.998,abs(n1.y)));",
    "  float luma=dot(tex,vec3(0.299,0.587,0.114));",
    "  tex=mix(vec3(luma),tex,0.78)*vec3(0.80,0.89,1.04);",
    "  float diff=dot(n,uSun);",
    "  float day=smoothstep(-0.28,0.38,diff);",
    "  float lonC=lon+uTime*0.005;",
    "  vec2 uvc=vec2(lonC/6.28318530718+0.5,0.5-lat/3.14159265359);",
    "  float cld=texture2D(uCld,uvc).r;",
    "  cld=smoothstep(0.05,0.78,cld);",
    "  float csh=texture2D(uCld,uvc+vec2(0.0035,0.0028)).r;",
    "  tex*=1.0-smoothstep(0.08,0.9,csh)*0.32*day;",
    "  vec3 sunCol=vec3(1.0,0.975,0.93);",
    "  float landness=smoothstep(0.0,0.18,tex.r-tex.b+0.08);",
    "  vec3 dayCol=tex*(0.20+1.05*max(diff,0.0))*sunCol;",
    "  vec3 hv=normalize(uSun+vec3(0.0,0.0,1.0));",
    "  dayCol+=pow(max(dot(n,hv),0.0),16.0)*(1.0-landness)*day*vec3(0.10,0.105,0.11);",
    "  vec3 nightCol=tex*0.035+pow(landness,2.0)*vec3(1.0,0.75,0.42)*0.16;",
    "  col=mix(nightCol,dayCol,day);",
    "  vec3 cloudCol=mix(vec3(0.05,0.06,0.09),sunCol*(0.15+1.05*max(diff,0.0)),day);",
    "  col=mix(col,cloudCol,cld*0.92);",
    "  float Rt=1.0+H;",
    "  float airmass=(sqrt(Rt*Rt-r*r)-z)/H;",
    "  float haze=1.0-exp(-airmass*0.20);",
    "  vec3 hazeCol=mix(atmoThin,atmoDense,clamp(airmass*0.30,0.0,1.0))*(0.18+0.68*day);",
    "  col=mix(col,hazeCol,clamp(haze,0.0,0.65));",
    "  col*=mix(1.06,0.95,uHero);",
    "  float cover=smoothstep(-1.1,-0.05,x);",
    "  col=mix(col,atmoLum,cover);",
    "  alpha=1.0;",
    " }else{",
    "  col=atmoLum;",
    "  alpha=clamp(I*0.50,0.0,1.0);",
    " }",
    " gl_FragColor=vec4(col,alpha);",
    "}",
    ].join("\n");
    function sh(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
      if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){throw gl.getShaderInfoLog(s);}return s;}
    var pr=gl.createProgram();
    gl.attachShader(pr,sh(gl.VERTEX_SHADER,VS));
    gl.attachShader(pr,sh(gl.FRAGMENT_SHADER,FS));
    gl.linkProgram(pr);gl.useProgram(pr);
    var buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
    var la=gl.getAttribLocation(pr,'a');
    gl.enableVertexAttribArray(la);
    gl.vertexAttribPointer(la,2,gl.FLOAT,false,0,0);
    var U={};['uRes','uC','uR','uRot','uTilt','uSun','uTex','uCld','uDeny','uHero','uTime'].forEach(function(k){U[k]=gl.getUniformLocation(pr,k);});
    E.U=U;E.pr=pr;
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
    function loadTex(unit,idx,src,uni,cb){
      var img=new Image();
      img.onload=function(){
        gl.activeTexture(unit);
        var tx=gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D,tx);
        gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,img);
        gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
        gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
        gl.uniform1i(uni,idx);
        cb();
      };
      img.src=src;
    }
    var loaded=0;function texDone(){if(++loaded===2)E.texReady=true;}
    loadTex(gl.TEXTURE0,0,EARTH_SRC,U.uTex,texDone);
    loadTex(gl.TEXTURE1,1,CLOUD_SRC,U.uCld,texDone);
    function resize(){
      E.dpr=Math.min(window.devicePixelRatio||1,2);
      var w=window.innerWidth,h=window.innerHeight;
      cv.width=Math.round(w*E.dpr);cv.height=Math.round(h*E.dpr);
    }
    resize();addEventListener('resize',resize);
    function heroParams(){
      var w=window.innerWidth,h=window.innerHeight;
      var R=Math.max(w,h)*1.34;
      var cap=Math.min(h*0.28,300);
      return {cx:w/2,cy:h+R-cap,R:R};
    }
    var last=null;
    function frame(ts){
      requestAnimationFrame(frame);
      if(!E.texReady)return;
      var dt=last==null?16:Math.min(50,ts-last);last=ts;
      if(E.mode==='hero'){var hp=heroParams();E.cx=hp.cx;E.cy=hp.cy;E.R=hp.R;}
      if(E.tween){
        var tw=E.tween,u=Math.min(1,(ts-tw.t0)/tw.dur);
        var e=u<.5?4*u*u*u:1-Math.pow(-2*u+2,3)/2;
        E.cx=tw.from.cx+(tw.to.cx-tw.from.cx)*e;
        E.cy=tw.from.cy+(tw.to.cy-tw.from.cy)*e;
        E.R=tw.from.R+(tw.to.R-tw.from.R)*e;
        E.rot=tw.from.rot+(tw.to.rot-tw.from.rot)*e;
        E.tilt=tw.from.tilt+(tw.to.tilt-tw.from.tilt)*e;
        E.spd=tw.from.spd*(1-e);
        E.heroF=1-e;
        var sx=(E.cx-tw.from.cx)*0.12,sy=(E.cy-tw.from.cy)*0.12;
        var st=document.getElementById('stars');
        st.style.transform='translate('+sx.toFixed(1)+'px,'+sy.toFixed(1)+'px) scale('+(1-0.15*e).toFixed(3)+')';
        if(u>=1){E.tween=null;E.mode='docked';if(tw.done)tw.done();}
      }else{
        E.rot+=E.spd*dt/1000;
      }
      if(E.mode==='docked'){
        var sl=document.getElementById('globeSlot').getBoundingClientRect();
        var tx=sl.left+sl.width/2,ty=sl.top+sl.height/2,tr=sl.width*0.485;
        E.cx+=(tx-E.cx)*0.25;E.cy+=(ty-E.cy)*0.25;E.R+=(tr-E.R)*0.25;
        var o=document.getElementById('ovl');
        o.style.left=sl.left+'px';o.style.top=sl.top+'px';
        o.style.width=sl.width+'px';o.style.height=sl.height+'px';
      }
      var gl=E.gl,w=window.innerWidth,h=window.innerHeight;
      gl.viewport(0,0,E.cv.width,E.cv.height);
      gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);
      gl.uniform2f(E.U.uRes,E.cv.width,E.cv.height);
      gl.uniform2f(E.U.uC,E.cx*E.dpr,(h-E.cy)*E.dpr);
      gl.uniform1f(E.U.uR,E.R*E.dpr);
      gl.uniform1f(E.U.uRot,E.rot);
      gl.uniform1f(E.U.uTilt,E.tilt);
      gl.uniform3f(E.U.uSun,-0.574,0.324,0.752);
      E.deny+=(E.denyT-E.deny)*0.06;
      gl.uniform1f(E.U.uDeny,E.deny);
      gl.uniform1f(E.U.uHero,E.heroF);
      gl.uniform1f(E.U.uTime,(ts%1e7)/1000);
      gl.drawArrays(gl.TRIANGLES,0,3);
    }
    requestAnimationFrame(frame);
  })();

  function placeOvl(){
    var slot=document.getElementById('globeSlot').getBoundingClientRect();
    var o=document.getElementById('ovl');
    o.style.left=slot.left+'px';o.style.top=slot.top+'px';
    o.style.width=slot.width+'px';o.style.height=slot.height+'px';
    return slot;
  }
  addEventListener('resize',function(){if(document.body.classList.contains('flight'))placeOvl();});
  function dockEarth(d,done){
    if(!E.ok){if(done)done();return;}
    var slot=placeOvl();
    var toRot=(d.lon!=null?d.lon:0)*Math.PI/180;
    var toTilt=-(d.lat!=null?d.lat:0)*Math.PI/180;
    // choose nearest equivalent rotation angle
    var cur=E.rot%(2*Math.PI);
    var base=E.rot-cur;
    var cands=[base+toRot-2*Math.PI,base+toRot,base+toRot+2*Math.PI],best=cands[0];
    for(var i=1;i<3;i++)if(Math.abs(cands[i]-E.rot)<Math.abs(best-E.rot))best=cands[i];
    if(best<E.rot)best+=2*Math.PI; // keep spinning forward into the lock
    E.tween={t0:performance.now(),dur:REDUCED?0:1900,
      from:{cx:E.cx,cy:E.cy,R:E.R,rot:E.rot,tilt:E.tilt,spd:E.spd},
      to:{cx:slot.left+slot.width/2,cy:slot.top+slot.height/2,R:slot.width*0.485,rot:best,tilt:toTilt},
      done:done};
  }

  /* ---------- overlay: uplink + coords ---------- */
  var pkRAF=null;
  function showOverlay(d){
    document.getElementById('gset').classList.add('on');
    var p=document.getElementById('arc'),x=100,y=100,nx=162.5,ny=30.5;
    var cx=(x+nx)/2+16,cy=Math.min(y,ny)-34;
    p.setAttribute('d','M'+x+' '+y+' Q '+cx.toFixed(1)+' '+cy.toFixed(1)+' '+nx+' '+ny);
    var L=p.getTotalLength();
    p.style.strokeDasharray=L;p.style.strokeDashoffset=L;
    p.style.transition='stroke-dashoffset 1s ease';
    requestAnimationFrame(function(){p.style.strokeDashoffset=0;});
    var rl=document.getElementById('relay');rl.style.transition='opacity .5s';rl.setAttribute('opacity','1');
    var pk=document.getElementById('pk'),t0=null;
    function step(ts){
      if(t0===null)t0=ts;
      var u=((ts-t0)/1400)%1;
      var pt=p.getPointAtLength(u*L);
      pk.setAttribute('cx',pt.x);pk.setAttribute('cy',pt.y);
      pk.setAttribute('opacity',u<.06||u>.94?0:.9);
      pkRAF=requestAnimationFrame(step);
    }
    setTimeout(function(){pkRAF=requestAnimationFrame(step);},950);
  }
  function rollCoords(d,ms){
    var el=document.getElementById('coords');if(d.lat==null){el.textContent='—';return;}
    var t0=null;
    function step(ts){
      if(t0===null)t0=ts;
      var u=Math.min(1,(ts-t0)/ms);u=1-Math.pow(1-u,3);
      el.innerHTML='<b>'+fmtCoords(d.lat*u,d.lon*u)+'</b>';
      if(u<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function showRow(i){var el=document.querySelector('.row[data-i="'+i+'"]');if(el)el.classList.add('show');}

  async function startAuth(){
    var keyEl=document.getElementById('key'),field=document.getElementById('field');
    if(!keyEl.value.trim()){
      field.classList.add('error');
      field.classList.remove('shake');void field.offsetWidth;field.classList.add('shake');
      keyEl.focus();
      return;
    }
    document.getElementById('hero').classList.add('gone');
    document.body.classList.add('flight');
    document.getElementById('gate').style.display='none';
    document.getElementById('auth').classList.add('on');
    document.getElementById('card').classList.add('wide');
    document.getElementById('hstat').textContent='Authorizing';
    document.getElementById('fkey').textContent='Session '+hex(4)+'-'+hex(4);
    document.getElementById('sid').textContent=hex(6);
    var data=originData||await originReady;
    document.getElementById('hloc').textContent=fmtLoc(data);
    // let the card finish widening, then fly the planet into the slot
    setTimeout(function(){
      dockEarth(data,function(){
        showOverlay(data);
        rollCoords(data,1000);
      });
      if(!E.ok){document.getElementById('gset').classList.add('on');rollCoords(data,1000);}
    },620);
    var t=140;[0,1,2,3,4].forEach(function(i){setTimeout(function(){showRow(i);},t+=470);});
    setTimeout(function(){
      document.getElementById('ip').textContent=data.ip;
      document.getElementById('loc').textContent=fmtLoc(data);
      document.getElementById('isp').textContent=data.isp||"—";
    },1000);
    setTimeout(function(){document.getElementById('bar').style.width='40%';},1300);
    setTimeout(function(){document.getElementById('bar').style.width='72%';},2500);
    setTimeout(function(){
      var bar=document.getElementById('bar');bar.style.width='82%';bar.classList.add('deny');
      var v=document.getElementById('verdict');
      v.classList.add('deny');v.textContent='Access denied — no matching invitation';
      document.getElementById('hstat').textContent='Denied';
      document.getElementById('hbadge').classList.add('denied');
      document.getElementById('card').classList.add('denied');
      E.denyT=1;
      if(pkRAF)cancelAnimationFrame(pkRAF);
      document.getElementById('pk').setAttribute('opacity','0');
      document.getElementById('arc').style.stroke='rgba(255,95,95,.45)';
      document.querySelectorAll('.row .ic.wait').forEach(function(x){x.style.color='var(--red)';x.style.animation='none';x.textContent='×';});
    },4100);
  }
</script>
