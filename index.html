<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Authorized access only.">
<meta name="theme-color" content="#0a0a0c">
<meta property="og:title" content="dom.">
<meta property="og:description" content="Authorized access only.">
<title>dom.</title>
<style>
  :root{
    --bg:#0a0a0c; --fg:#f1f1f3; --dim:#8a8a93; --faint:#5c5c65; --accent:#4ade80; --red:#ff5f5f;
    --cardbg:rgba(22,22,27,.55); --cardline:rgba(255,255,255,.08); --inset:rgba(0,0,0,.28);
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Inter,Roboto,Arial,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--fg);font-family:var(--sans);min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;position:relative;overflow-x:hidden}
  /* ambient: slow-drifting aurora */
  .aur{position:fixed;inset:-25%;z-index:0;pointer-events:none;filter:blur(90px)}
  .a1{background:radial-gradient(38% 38% at 32% 40%,rgba(74,222,128,.10),transparent 70%);animation:drift1 26s ease-in-out infinite alternate}
  .a2{background:radial-gradient(34% 34% at 68% 58%,rgba(56,189,248,.06),transparent 70%);animation:drift2 34s ease-in-out infinite alternate}
  @keyframes drift1{to{transform:translate(7%,5%) scale(1.12)}}
  @keyframes drift2{to{transform:translate(-6%,-7%) scale(1.08)}}
  .vig{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(120% 120% at 50% 120%,rgba(0,0,0,.5),transparent 60%)}
  .wrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:34px clamp(26px,5vw,60px)}
  header,footer{display:flex;justify-content:space-between;align-items:center;
    font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);font-weight:500}
  .status{display:flex;align-items:center;gap:9px;transition:color .3s}
  .status.denied{color:var(--red)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2.4s infinite}
  .status.denied .dot{background:var(--red);animation:none;box-shadow:0 0 8px rgba(255,95,95,.6)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
  main{flex:1;display:flex;align-items:center;justify-content:center}

  /* frosted card + border beam */
  @property --bang{syntax:'<angle>';initial-value:0deg;inherits:false}
  .card{position:relative;width:min(92vw,428px);background:var(--cardbg);
    border:1px solid var(--cardline);border-radius:22px;padding:40px 36px;
    backdrop-filter:blur(22px) saturate(130%);-webkit-backdrop-filter:blur(22px) saturate(130%);
    box-shadow:0 30px 80px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.05);
    transition:width .55s cubic-bezier(.4,0,.2,1)}
  .card.wide{width:min(94vw,596px)}
  .card::before{content:"";position:absolute;inset:-1px;border-radius:inherit;padding:1px;pointer-events:none;
    background:conic-gradient(from var(--bang),transparent 0 72%,rgba(74,222,128,.65) 86%,transparent 100%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;
    animation:beam 7s linear infinite}
  @keyframes beam{to{--bang:360deg}}
  .card.denied::before{background:conic-gradient(from var(--bang),transparent 0 72%,rgba(255,95,95,.55) 86%,transparent 100%)}

  .brandmark{width:48px;height:48px;margin:0 auto 22px;border:1px solid var(--cardline);border-radius:14px;
    display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);position:relative}
  .brandmark::before{content:"";width:19px;height:19px;border-radius:50%;
    border:2px solid var(--accent);border-right-color:transparent;border-bottom-color:transparent;transform:rotate(20deg);animation:spin 3.5s linear infinite}
  @keyframes spin{to{transform:rotate(380deg)}}
  .mark{font-size:32px;font-weight:600;letter-spacing:-.02em;text-align:center}
  .mark span{color:var(--accent)}
  .hint{text-align:center;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-top:10px;font-weight:500}
  form{display:flex;flex-direction:column;gap:12px;margin-top:28px}
  .field{display:flex;align-items:center;background:var(--inset);border:1px solid var(--cardline);border-radius:12px;padding:0 15px;transition:.2s}
  .field:focus-within{border-color:rgba(255,255,255,.2)}
  .field.error{border-color:rgba(255,95,95,.6)}
  .field.error .k{color:var(--red)}
  .shake{animation:shake .34s cubic-bezier(.36,.07,.19,.97)}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
  .field .k{color:var(--faint);font-size:14px;margin-right:11px}
  input{flex:1;background:none;border:none;outline:none;color:var(--fg);font-family:var(--sans);font-size:14.5px;padding:15px 0;letter-spacing:.14em}
  input::placeholder{color:#55555e;letter-spacing:.12em}
  button{margin-top:2px;background:var(--fg);color:#0a0a0c;border:none;border-radius:12px;padding:15px;
    font-family:var(--sans);font-size:13.5px;font-weight:600;letter-spacing:.02em;cursor:pointer;transition:.2s}
  button:hover{background:var(--accent)}
  .foot-note{text-align:center;font-size:11px;letter-spacing:.06em;color:var(--faint);margin-top:22px}

  /* authorizing */
  .auth{display:none;flex-direction:column;gap:24px}
  .auth.on{display:flex}
  .scope-row{display:flex;gap:30px;align-items:center}
  .locate{display:flex;flex-direction:column;align-items:center;gap:10px;flex:none}
  .globe{position:relative;width:180px;height:180px}
  .globe svg{width:100%;height:100%;overflow:visible}
  .g-line{fill:none;stroke:rgba(255,255,255,.09);stroke-width:1}
  .g-mer{fill:none;stroke:rgba(174,255,205,.10);stroke-width:1}
  .g-outline{fill:none;stroke:rgba(255,255,255,.16);stroke-width:1.1}
  .g-orbit{fill:none;stroke:rgba(255,255,255,.10);stroke-width:.8;stroke-dasharray:2 5}
  .g-sat{fill:#cfe9dc}
  .g-sat2{fill:rgba(74,222,128,.9)}
  .scanband{fill:none;stroke:rgba(74,222,128,.22);stroke-width:1.4}
  .arc{fill:none;stroke:rgba(74,222,128,.55);stroke-width:1.2}
  .node{fill:none;stroke:rgba(74,222,128,.8);stroke-width:1.1}
  .nodecore{fill:var(--accent)}
  .pk{fill:#eafff2}
  .marker{opacity:0;transition:opacity .5s}
  .marker.on{opacity:1}
  .m-dot{fill:var(--accent)}
  .m-glow{fill:var(--accent);opacity:.18}
  .m-ring{fill:none;stroke:var(--accent);stroke-width:1.2;transform-box:fill-box;transform-origin:center;animation:beacon 2.2s ease-out infinite}
  @keyframes beacon{0%{transform:scale(.4);opacity:.9}100%{transform:scale(2.6);opacity:0}}
  .m-tick{stroke:var(--accent);stroke-width:1;opacity:.6}
  .coords{font-size:11px;letter-spacing:.08em;color:var(--dim);font-variant-numeric:tabular-nums;min-height:14px}
  .coords b{color:var(--fg);font-weight:500}
  .log{flex:1;display:flex;flex-direction:column;gap:11px;font-size:13.5px;min-width:0}
  .row{display:flex;align-items:center;gap:11px;color:var(--dim);opacity:0;transform:translateY(3px);transition:.35s}
  .row.show{opacity:1;transform:none}
  .row .ic{width:14px;text-align:center;color:var(--accent);font-size:12px}
  .row .ic.wait{color:var(--faint);animation:blink 1.1s ease-in-out infinite}
  @keyframes blink{50%{opacity:.25}}
  .bar{width:100%;height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;background:var(--accent);transition:width .5s ease}
  .bar i.deny{background:var(--red)}
  .origin{width:100%;border:1px solid var(--cardline);border-radius:14px;padding:18px 20px;background:var(--inset);
    display:grid;grid-template-columns:1fr 1fr;gap:16px 22px}
  .origin .l{color:var(--faint);letter-spacing:.12em;text-transform:uppercase;font-size:10px;margin-bottom:5px;font-weight:500}
  .origin .v{color:var(--fg);font-size:14px;font-variant-numeric:tabular-nums}
  .origin .v.acc{color:var(--accent)}
  .verdict{position:relative;overflow:hidden;width:100%;text-align:center;font-size:12.5px;letter-spacing:.03em;
    padding:14px;border-radius:12px;border:1px solid var(--cardline);background:rgba(74,222,128,.06);color:var(--accent);transition:.4s;font-weight:500}
  .verdict:not(.deny)::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
    background:linear-gradient(105deg,transparent 40%,rgba(74,222,128,.14) 50%,transparent 60%);animation:sheen 2.2s ease infinite}
  @keyframes sheen{to{transform:translateX(100%)}}
  .verdict.deny{border-color:rgba(255,95,95,.28);background:rgba(255,95,95,.07);color:var(--red)}
  a{color:inherit;text-decoration:none}

  @media(max-width:600px){
    .wrap{padding:20px 18px}
    .card{padding:28px 22px;border-radius:18px}
    .brandmark{width:42px;height:42px;margin-bottom:16px}
    .mark{font-size:27px}
    .hint{margin-top:8px}
    form{margin-top:22px}
    .foot-note{margin-top:16px}
    .auth{gap:16px}
    .scope-row{gap:14px}
    .globe{width:116px;height:116px}
    .coords{font-size:10px}
    .log{gap:8px;font-size:11.5px}
    .bar{height:2px}
    .origin{padding:14px 15px;gap:12px 14px}
    .origin .v{font-size:12.5px}
    .verdict{padding:11px;font-size:11.5px}
    header,footer{font-size:10px}
  }
  @media(max-height:560px){
    .globe{width:96px;height:96px}
    .auth{gap:12px}.card{padding:22px}
  }
</style>
</head>
<body>
  <div class="aur a1"></div><div class="aur a2"></div><div class="vig"></div>
  <div class="wrap">
    <header>
      <div id="hloc">Locating&hellip;</div>
      <div class="status" id="hbadge"><span class="dot"></span> <span id="hstat">Secure</span></div>
    </header>

    <main>
      <div class="card" id="card">
        <div id="gate">
          <div class="brandmark"></div>
          <div class="mark">dom<span>.</span></div>
          <div class="hint">Authorized access only</div>
          <form onsubmit="startAuth();return false">
            <div class="field" id="field"><span class="k">&rsaquo;</span><input id="key" type="text" placeholder="Access key" autocomplete="off" oninput="document.getElementById('field').classList.remove('error')"></div>
            <button type="submit">Continue</button>
          </form>
          <div class="foot-note">Access is granted by invitation</div>
        </div>

        <div class="auth" id="auth">
          <div class="scope-row">
            <div class="locate">
              <div class="globe">
                <svg viewBox="0 0 200 200" aria-hidden="true">
                  <circle class="g-outline" cx="100" cy="100" r="92"/>
                  <!-- latitude rings (static under spin) -->
                  <ellipse class="g-line" cx="100" cy="30" rx="59.7" ry="13"/>
                  <ellipse class="g-line" cx="100" cy="62" rx="83.8" ry="18"/>
                  <ellipse class="g-line" cx="100" cy="100" rx="92" ry="20"/>
                  <ellipse class="g-line" cx="100" cy="138" rx="83.8" ry="18"/>
                  <ellipse class="g-line" cx="100" cy="170" rx="59.7" ry="13"/>
                  <line class="g-line" x1="100" y1="8" x2="100" y2="192"/>
                  <!-- meridians sweeping = rotation -->
                  <ellipse class="g-mer" cx="100" cy="100" ry="92" rx="92">
                    <animate attributeName="rx" values="92;64;22;2;22;64;92" dur="10s" begin="0s" repeatCount="indefinite"/>
                  </ellipse>
                  <ellipse class="g-mer" cx="100" cy="100" ry="92" rx="64">
                    <animate attributeName="rx" values="92;64;22;2;22;64;92" dur="10s" begin="-2.5s" repeatCount="indefinite"/>
                  </ellipse>
                  <ellipse class="g-mer" cx="100" cy="100" ry="92" rx="22">
                    <animate attributeName="rx" values="92;64;22;2;22;64;92" dur="10s" begin="-5s" repeatCount="indefinite"/>
                  </ellipse>
                  <ellipse class="g-mer" cx="100" cy="100" ry="92" rx="45">
                    <animate attributeName="rx" values="92;64;22;2;22;64;92" dur="10s" begin="-7.5s" repeatCount="indefinite"/>
                  </ellipse>
                  <!-- latitude scan band sweeping the sphere -->
                  <ellipse class="scanband" cx="100" cy="100" rx="92" ry="20">
                    <animate attributeName="cy" values="20;60;100;140;180;140;100;60;20" dur="7s" repeatCount="indefinite"/>
                    <animate attributeName="rx" values="42;82;92;82;42;82;92;82;42" dur="7s" repeatCount="indefinite"/>
                    <animate attributeName="ry" values="9;17;20;17;9;17;20;17;9" dur="7s" repeatCount="indefinite"/>
                    <animate attributeName="stroke-opacity" values=".1;.3;.35;.3;.1;.3;.35;.3;.1" dur="7s" repeatCount="indefinite"/>
                  </ellipse>
                  <!-- satellites -->
                  <g transform="rotate(-16 100 100)">
                    <ellipse class="g-orbit" cx="100" cy="100" rx="106" ry="34"/>
                    <path id="ob1" d="M-6,100 a106,34 0 1,0 212,0 a106,34 0 1,0 -212,0" fill="none" stroke="none"/>
                    <circle class="g-sat" r="2.4"><animateMotion dur="9s" repeatCount="indefinite"><mpath href="#ob1"/></animateMotion></circle>
                  </g>
                  <g transform="rotate(22 100 100)">
                    <ellipse class="g-orbit" cx="100" cy="100" rx="112" ry="27" style="stroke-opacity:.5"/>
                    <path id="ob2" d="M-12,100 a112,27 0 1,0 224,0 a112,27 0 1,0 -224,0" fill="none" stroke="none"/>
                    <circle class="g-sat2" r="1.9"><animateMotion dur="13s" repeatCount="indefinite" keyPoints="1;0" keyTimes="0;1" calcMode="linear"><mpath href="#ob2"/></animateMotion></circle>
                  </g>
                  <!-- uplink arc: marker -> relay node (drawn by JS) -->
                  <path class="arc" id="arc"/>
                  <g id="relay" opacity="0">
                    <rect class="node" x="158" y="26" width="9" height="9" rx="2"/>
                    <circle class="nodecore" cx="162.5" cy="30.5" r="1.6"/>
                  </g>
                  <circle class="pk" id="pk" r="1.8" opacity="0"/>
                  <g class="marker" id="marker">
                    <circle class="m-glow" r="9"/>
                    <circle class="m-ring" r="6"/>
                    <line class="m-tick" x1="-11" y1="0" x2="-5" y2="0"/>
                    <line class="m-tick" x1="5" y1="0" x2="11" y2="0"/>
                    <line class="m-tick" x1="0" y1="-11" x2="0" y2="-5"/>
                    <line class="m-tick" x1="0" y1="5" x2="0" y2="11"/>
                    <circle class="m-dot" r="3.2"/>
                  </g>
                </svg>
              </div>
              <div class="coords" id="coords"></div>
            </div>
            <div class="log" id="log">
              <div class="row" data-i="0"><span class="ic">&#10003;</span><span>Establishing secure channel</span></div>
              <div class="row" data-i="1"><span class="ic">&#10003;</span><span>Fingerprinting device</span></div>
              <div class="row" data-i="2"><span class="ic">&#10003;</span><span>Resolving origin</span></div>
              <div class="row" data-i="3"><span class="ic wait">&#9675;</span><span>Cross-referencing registry</span></div>
              <div class="row" data-i="4"><span class="ic wait">&#9675;</span><span>Validating key signature</span></div>
            </div>
          </div>
          <div class="bar"><i id="bar"></i></div>
          <div class="origin">
            <div><div class="l">Origin IP</div><div class="v acc" id="ip">&mdash;</div></div>
            <div><div class="l">Location</div><div class="v" id="loc">Resolving&hellip;</div></div>
            <div><div class="l">Network</div><div class="v" id="isp">&mdash;</div></div>
            <div><div class="l">Session</div><div class="v" id="sid">&mdash;</div></div>
          </div>
          <div class="verdict" id="verdict">Verifying credentials&hellip;</div>
        </div>
      </div>
    </main>

    <footer>
      <div id="fkey">Node 00</div>
      <div>&copy; 2026</div>
    </footer>
  </div>

<script>
  var DEMO={ip:"203.0.113.42",city:"London",cc:"GB",country:"United Kingdom",isp:"Zayo Bandwidth",lat:51.5074,lon:-0.1278};
  function hex(n){var s="";for(var i=0;i<n;i++)s+="0123456789ABCDEF"[Math.floor(Math.random()*16)];return s;}
  async function resolveIP(){
    try{var c=new AbortController();setTimeout(function(){c.abort();},1500);
      var r=await fetch("https://ipwho.is/",{signal:c.signal});var d=await r.json();
      if(d&&d.success!==false)return{ip:d.ip,city:d.city,cc:d.country_code,country:d.country,isp:(d.connection&&d.connection.isp)||"—",lat:d.latitude,lon:d.longitude};
    }catch(e){}
    return DEMO;
  }
  function fmtLoc(d){var s=(d.city?d.city+", ":"")+(d.cc||d.country||"");return s||"Unknown";}
  function fmtCoords(la,lo){
    var a=Math.abs(la).toFixed(4)+"° "+(la>=0?"N":"S");
    var b=Math.abs(lo).toFixed(4)+"° "+(lo>=0?"E":"W");
    return a+" · "+b;
  }
  var pkRAF=null;
  function placeMarker(d){
    var m=document.getElementById('marker');if(!m||d.lat==null)return;
    var x=100+(Math.max(-180,Math.min(180,d.lon))/180)*82;
    var y=100-(Math.max(-90,Math.min(90,d.lat))/90)*72;
    m.setAttribute('transform','translate('+x.toFixed(1)+' '+y.toFixed(1)+')');
    m.classList.add('on');
    // uplink arc to relay node with packet stream
    var p=document.getElementById('arc'),nx=162.5,ny=30.5;
    var cx=(x+nx)/2+16,cy=Math.min(y,ny)-34;
    p.setAttribute('d','M'+x.toFixed(1)+' '+y.toFixed(1)+' Q '+cx.toFixed(1)+' '+cy.toFixed(1)+' '+nx+' '+ny);
    var L=p.getTotalLength();
    p.style.strokeDasharray=L;p.style.strokeDashoffset=L;
    p.style.transition='stroke-dashoffset 1s ease';
    requestAnimationFrame(function(){p.style.strokeDashoffset=0;});
    document.getElementById('relay').style.transition='opacity .5s';
    document.getElementById('relay').setAttribute('opacity','1');
    var pk=document.getElementById('pk'),t0=null;
    function step(ts){
      if(t0===null)t0=ts;
      var u=((ts-t0)/1400)%1;
      var pt=p.getPointAtLength(u*L);
      pk.setAttribute('cx',pt.x);pk.setAttribute('cy',pt.y);
      pk.setAttribute('opacity',u<.06||u>.94?0:.9);
      pkRAF=requestAnimationFrame(step);
    }
    setTimeout(function(){pkRAF=requestAnimationFrame(step);},950);
  }
  function rollCoords(d,ms){
    var el=document.getElementById('coords');if(d.lat==null){el.textContent='—';return;}
    var t0=null;
    function step(ts){
      if(t0===null)t0=ts;
      var u=Math.min(1,(ts-t0)/ms);u=1-Math.pow(1-u,3);
      el.innerHTML='<b>'+fmtCoords(d.lat*u,d.lon*u)+'</b>';
      if(u<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  var originData=null;
  var originReady=resolveIP().then(function(d){
    originData=d;
    var h=document.getElementById('hloc');if(h)h.textContent=fmtLoc(d);
    return d;
  });
  function showRow(i){var el=document.querySelector('.row[data-i="'+i+'"]');if(el)el.classList.add('show');}
  async function startAuth(){
    var keyEl=document.getElementById('key'),field=document.getElementById('field');
    if(!keyEl.value.trim()){
      field.classList.add('error');
      field.classList.remove('shake');void field.offsetWidth;field.classList.add('shake');
      keyEl.focus();
      return;
    }
    document.getElementById('gate').style.display='none';
    document.getElementById('auth').classList.add('on');
    document.getElementById('card').classList.add('wide');
    document.getElementById('hstat').textContent='Authorizing';
    document.getElementById('fkey').textContent='Session '+hex(4)+'-'+hex(4);
    document.getElementById('sid').textContent=hex(6);
    var data=originData||await originReady;
    document.getElementById('hloc').textContent=fmtLoc(data);
    var t=0;[0,1,2,3,4].forEach(function(i){setTimeout(function(){showRow(i);},t+=460);});
    setTimeout(function(){
      document.getElementById('ip').textContent=data.ip;
      document.getElementById('loc').textContent=fmtLoc(data);
      document.getElementById('isp').textContent=data.isp||"—";
      rollCoords(data,1100);
      placeMarker(data);
    },900);
    setTimeout(function(){document.getElementById('bar').style.width='45%';},1200);
    setTimeout(function(){document.getElementById('bar').style.width='75%';},2200);
    setTimeout(function(){
      var bar=document.getElementById('bar');bar.style.width='82%';bar.classList.add('deny');
      var v=document.getElementById('verdict');
      v.classList.add('deny');v.textContent='Access denied — no matching invitation';
      document.getElementById('hstat').textContent='Denied';
      document.getElementById('hbadge').classList.add('denied');
      document.getElementById('card').classList.add('denied');
      if(pkRAF)cancelAnimationFrame(pkRAF);
      document.getElementById('pk').setAttribute('opacity','0');
      document.getElementById('arc').style.stroke='rgba(255,95,95,.4)';
      document.querySelectorAll('.row .ic.wait').forEach(function(x){x.style.color='var(--red)';x.style.animation='none';x.textContent='×';});
    },3400);
  }
</script>
</body>
</html>
